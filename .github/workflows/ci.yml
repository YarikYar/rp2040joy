name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Pin pico-sdk to a specific tag for reproducibility. Bump deliberately.
env:
  PICO_SDK_TAG: 2.1.1

jobs:
  firmware:
    name: Build firmware (RP2040)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential \
            gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib

      - name: Cache pico-sdk
        id: pico-sdk-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/pico-sdk
          key: pico-sdk-${{ env.PICO_SDK_TAG }}

      - name: Fetch pico-sdk
        if: steps.pico-sdk-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "$PICO_SDK_TAG" \
            https://github.com/raspberrypi/pico-sdk.git "$RUNNER_TEMP/pico-sdk"
          git -C "$RUNNER_TEMP/pico-sdk" submodule update --init --recursive --depth 1

      - name: Configure
        env:
          PICO_SDK_PATH: ${{ runner.temp }}/pico-sdk
        run: cmake -S firmware -B firmware/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build firmware/build -j

      - name: Report binary size
        run: arm-none-eabi-size firmware/build/rp2040joy.elf

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: rp2040joy-firmware
          path: |
            firmware/build/rp2040joy.uf2
            firmware/build/rp2040joy.elf

  app-linux:
    name: Build Qt configurator (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential pkg-config \
            qt6-base-dev qt6-base-dev-tools \
            libhidapi-dev

      - name: Configure
        run: cmake -S app -B app/build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build app/build -j

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: rp2040joy-app-linux-x86_64
          path: app/build/rp2040joy_app

  app-windows:
    name: Build Qt configurator (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Install hidapi
        shell: pwsh
        run: vcpkg install hidapi:x64-windows

      - name: Configure
        shell: pwsh
        run: |
          cmake -S app -B app/build `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build app/build --config Release --parallel --verbose

      - name: Stage
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force app-windows | Out-Null
          Copy-Item app/build/Release/rp2040joy_app.exe app-windows/
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin/hidapi.dll" app-windows/
          windeployqt --no-translations --no-system-d3d-compiler --no-opengl-sw --release app-windows/rp2040joy_app.exe

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rp2040joy-app-windows-x64
          path: app-windows/
